{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2 class="text-center mb-2">Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="login_id">Username or Email</label>
            <input type="text" id="login_id" name="login_id" class="form-control" required
                placeholder="Enter your username or email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-container">
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="Enter your password">
                <button type="button" class="toggle-password" onclick="togglePassword('password', this)"
                    title="Show Password">
                    <svg xmlns="http://www.w3.org/Dom/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>
        <div style="text-align: right; margin-bottom: 1rem;">
            <a href="{{ url_for('forgot_password') }}" class="text-muted" style="font-size: 0.9rem;">Forgot
                Password?</a>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="text-center mt-1 text-muted">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
    </p>
</div>

<script>
    function togglePassword(inputId, button) {
        var input = document.getElementById(inputId);
        var svg = button.querySelector('svg');
        if (input.type === "password") {
            input.type = "text";
            button.title = "Hide Password";
            // Eye slash SVG
            svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
        } else {
            input.type = "password";
            button.title = "Show Password";
            // Eye SVG
            svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
        }
    }
</script>
{% endblock %}
