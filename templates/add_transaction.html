{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2 class="mb-2">Add Transaction</h2>

    <form action="{{ url_for('add_transaction') }}" method="POST">
        <div class="form-group">
            <label for="type">Type</label>
            <select id="type" name="type" class="form-control" required>
                <option value="Expense">Expense</option>
                <option value="Income">Income</option>
            </select>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-control" required>
                <option value="Salary">Salary</option>
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Electricity">Electricity</option>
                <option value="Transport">Transport</option>
                <option value="Health">Health</option>
                <option value="Shopping">Shopping</option>
                <option value="Education">Education</option>
                <option value="Groceries">Groceries</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" name="amount" class="form-control" step="0.01" min="0.01" required
                placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="text" id="date" name="date" class="form-control" required placeholder="Select a date">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Add Transaction</button>
            <a href="{{ url_for('dashboard') }}" class="btn"
                style="background: var(--hover-bg); color: var(--text-color); border: 1px solid var(--border-color);">Cancel</a>
        </div>
    </form>
</div>

<!-- Include Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        flatpickr("#date", {
            dateFormat: "d-m-Y",
            allowInput: true,
            defaultDate: new Date()
        });
    });
</script>
{% endblock %}
