{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2 class="text-center mb-2">New Password</h2>
    <p class="text-center text-muted mb-2">Create a new, strong password.</p>

    <form action="{{ url_for('reset_password') }}" method="POST">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" required
                placeholder="Enter new password" pattern="(?=.*[!@#$%^&*]).{8,}"
                title="Must contain at least 8 characters and 1 special character (!@#$%^&*)">
            <small class="text-muted" style="display: block; margin-top: 0.25rem;">Min. 8 chars & 1 special
                character</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required
                placeholder="Confirm new password">
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
    </form>
</div>
{% endblock %}
