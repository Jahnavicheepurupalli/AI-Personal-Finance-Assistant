{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 2rem auto;">
    <div class="card">
        <h2 class="text-center mb-2">Edit Transaction</h2>
        <form action="{{ url_for('edit_transaction', id=transaction.id) }}" method="POST">
            <div class="form-group mb-1">
                <label for="type">Type</label>
                <select id="type" name="type" class="form-control" required>
                    <option value="Income" {% if transaction.type=='Income' %}selected{% endif %}>Income</option>
                    <option value="Expense" {% if transaction.type=='Expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>

            <div class="form-group mb-1">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" class="form-control" value="{{ transaction.category }}"
                    required>
            </div>

            <div class="form-group mb-1">
                <label for="amount">Amount (₹)</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control"
                    value="{{ transaction.amount }}" required>
            </div>

            <div class="form-group mb-2">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-control" value="{{ transaction.date }}" required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                <a href="{{ url_for('history') }}" class="btn btn-secondary"
                    style="flex: 1; text-align: center; background-color: #333; color: white; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
