{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2 class="text-center mb-2">Reset Password</h2>
    <p class="text-center text-muted mb-2">Enter your email address and we'll help you reset your password.</p>

    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
    </form>

    <p class="text-center mt-1 text-muted">
        Remembered your password? <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>
{% endblock %}
